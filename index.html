<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UX Research Platform</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔍</text></svg>" />
<style>
:root {
  --bg: #0b1020;
  --surface: #141a33;
  --surface-2: #1b2347;
  --surface-3: #242d5c;
  --border: #2d3868;
  --text: #e6e8f2;
  --text-muted: #9aa3c7;
  --text-dim: #6b7290;
  --accent: #7c5cff;
  --accent-hover: #9378ff;
  --accent-2: #00d4ff;
  --good: #22c55e;
  --warn: #f59e0b;
  --bad: #ef4444;
  --positive: #22c55e;
  --negative: #ef4444;
  --neutral: #94a3b8;
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 4px 12px rgba(0,0,0,0.25);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; line-height: 1.5; min-height: 100vh; }
button, input, textarea, select { font: inherit; color: inherit; }
button { cursor: pointer; background: none; border: none; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
code { font-family: 'SF Mono', ui-monospace, monospace; font-size: 0.9em; background: var(--surface-2); padding: 1px 6px; border-radius: 4px; }

/* ===== Layout ===== */
.app { display: flex; flex-direction: column; min-height: 100vh; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
.topbar .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; }
.topbar .brand-dot { width: 8px; height: 8px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-2)); }
.topbar .breadcrumb { display: flex; align-items: center; gap: 8px; color: var(--text-muted); font-size: 14px; }
.topbar .breadcrumb .sep { color: var(--text-dim); }
.topbar .breadcrumb .crumb-link { color: var(--text-muted); cursor: pointer; }
.topbar .breadcrumb .crumb-link:hover { color: var(--text); }
.topbar .user { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-muted); }
.topbar .user-name { color: var(--text); font-weight: 500; }
.main { flex: 1; padding: 32px; max-width: 1480px; margin: 0 auto; width: 100%; }
.main.wide { max-width: 100%; padding: 0; }
.page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; gap: 20px; flex-wrap: wrap; }
.page-title { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
.page-sub { color: var(--text-muted); font-size: 14px; margin-top: 4px; }

/* ===== Buttons ===== */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 500; border: 1px solid var(--border); background: var(--surface-2); color: var(--text); transition: all 0.15s; white-space: nowrap; }
.btn:hover { background: var(--surface-3); border-color: var(--surface-3); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.btn-danger { color: var(--bad); border-color: var(--border); }
.btn-danger:hover { background: rgba(239,68,68,0.1); border-color: var(--bad); }
.btn-ghost { background: transparent; border-color: transparent; color: var(--text-muted); }
.btn-ghost:hover { background: var(--surface-2); color: var(--text); }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* ===== Cards ===== */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
.card-title { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px; }
.card-grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }

/* ===== Forms ===== */
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.field-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
.field input, .field textarea, .field select { padding: 9px 12px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; width: 100%; transition: border 0.15s; }
.field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 70px; font-family: inherit; }
.field-row { display: flex; gap: 12px; }
.field-row .field { flex: 1; }

/* ===== Dashboard / Project list ===== */
.project-card { display: block; padding: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); cursor: pointer; transition: all 0.15s; }
.project-card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: var(--shadow); text-decoration: none; }
.project-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.project-card p { color: var(--text-muted); font-size: 13px; margin-bottom: 12px; }
.project-card .meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-dim); }

.empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); font-size: 14px; }
.empty-state .icon { font-size: 32px; margin-bottom: 10px; opacity: 0.7; }

/* ===== Sites tab in project view ===== */
.site-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; }
.site-row:hover { border-color: var(--surface-3); }
.site-info { flex: 1; min-width: 0; }
.site-name { font-weight: 600; font-size: 14px; }
.site-url { color: var(--text-muted); font-size: 12px; font-family: 'SF Mono', ui-monospace, monospace; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.site-actions { display: flex; gap: 8px; align-items: center; }
.site-captures { color: var(--text-dim); font-size: 12px; margin-right: 12px; }

/* ===== Theme tab ===== */
.theme-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; }
.theme-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.theme-item .theme-info { flex: 1; }
.theme-item .theme-name { font-weight: 600; font-size: 14px; }
.theme-item .theme-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.theme-item .theme-count { font-size: 12px; color: var(--text-dim); padding: 2px 8px; background: var(--surface-2); border-radius: 999px; }

/* ===== Tabs ===== */
.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 24px; overflow-x: auto; }
.tab { padding: 10px 18px; font-size: 13px; font-weight: 500; color: var(--text-muted); border-bottom: 2px solid transparent; white-space: nowrap; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }

/* ===== Captures grid ===== */
.capture-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
.capture-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; cursor: pointer; transition: all 0.15s; }
.capture-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.capture-thumb { width: 100%; height: 160px; background: var(--surface-2) center/cover no-repeat; border-bottom: 1px solid var(--border); }
.capture-body { padding: 12px 14px; }
.capture-state { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
.capture-title { font-size: 13px; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.capture-annot-count { display: inline-block; margin-top: 6px; font-size: 11px; color: var(--text-dim); }

/* ===== Annotation Workspace ===== */
.annotation-layout { display: grid; grid-template-columns: 1fr 380px; height: calc(100vh - 56px); }
.annotation-canvas-wrap { background: #0a0e1c; position: relative; overflow: auto; }
.annotation-canvas { position: relative; display: inline-block; margin: 16px; user-select: none; }
.annotation-canvas img { display: block; box-shadow: var(--shadow); border-radius: 4px; }
.annotation-canvas .rect {
  position: absolute;
  border: 2px solid;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.1s;
  background: transparent;
}
.annotation-canvas .rect:hover { transform: scale(1.01); }
.annotation-canvas .rect.active { box-shadow: 0 0 0 2px white, 0 0 12px rgba(255,255,255,0.4); }
.annotation-canvas .rect .pin {
  position: absolute;
  top: -12px;
  left: -12px;
  width: 24px;
  height: 24px;
  background: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  box-shadow: var(--shadow);
  border: 2px solid;
  cursor: pointer;
}
.annotation-canvas .drawing-rect {
  position: absolute;
  border: 2px dashed var(--accent);
  background: rgba(124, 92, 255, 0.1);
  pointer-events: none;
}
.annotation-canvas.drawing { cursor: crosshair; }

.annotation-panel { background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; padding: 20px; }
.panel-section { margin-bottom: 22px; }
.panel-section h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 10px; font-weight: 600; }
.panel-help { font-size: 12px; color: var(--text-muted); background: var(--surface-2); padding: 10px 12px; border-radius: 6px; line-height: 1.5; }
.panel-help kbd { background: var(--surface-3); padding: 1px 5px; border-radius: 3px; font-size: 11px; font-family: monospace; }

.sentiment-group { display: flex; gap: 6px; }
.sentiment-btn { flex: 1; padding: 8px; border-radius: 6px; background: var(--surface-2); border: 1px solid var(--border); color: var(--text-muted); font-size: 12px; font-weight: 500; }
.sentiment-btn:hover { color: var(--text); }
.sentiment-btn.active.positive { background: rgba(34,197,94,0.15); color: var(--positive); border-color: var(--positive); }
.sentiment-btn.active.negative { background: rgba(239,68,68,0.15); color: var(--negative); border-color: var(--negative); }
.sentiment-btn.active.neutral { background: rgba(148,163,184,0.15); color: var(--neutral); border-color: var(--neutral); }

.annotation-list-item { padding: 10px 12px; background: var(--surface-2); border-radius: 6px; margin-bottom: 6px; cursor: pointer; border-left: 3px solid; transition: all 0.1s; }
.annotation-list-item:hover { background: var(--surface-3); }
.annotation-list-item.selected { background: var(--surface-3); box-shadow: 0 0 0 1px var(--accent); }
.annotation-list-item .title { font-size: 13px; font-weight: 500; }
.annotation-list-item .meta { display: flex; gap: 8px; margin-top: 4px; font-size: 11px; color: var(--text-muted); flex-wrap: wrap; }
.annotation-list-item .meta .sentiment-tag { padding: 1px 6px; border-radius: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; font-size: 10px; }
.annotation-list-item .meta .sentiment-tag.positive { background: rgba(34,197,94,0.15); color: var(--positive); }
.annotation-list-item .meta .sentiment-tag.negative { background: rgba(239,68,68,0.15); color: var(--negative); }
.annotation-list-item .meta .sentiment-tag.neutral { background: rgba(148,163,184,0.15); color: var(--neutral); }

/* Top-level sentiment tag, reusable anywhere */
.sentiment-tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; font-size: 10px; }
.sentiment-tag.positive { background: rgba(34,197,94,0.15); color: var(--positive); }
.sentiment-tag.negative { background: rgba(239,68,68,0.15); color: var(--negative); }
.sentiment-tag.neutral  { background: rgba(148,163,184,0.15); color: var(--neutral);  }

.ai-suggest-btn { display: flex; align-items: center; gap: 6px; padding: 6px 10px; background: rgba(124,92,255,0.12); color: var(--accent); border: 1px solid rgba(124,92,255,0.3); border-radius: 6px; font-size: 12px; font-weight: 500; margin-bottom: 10px; }
.ai-suggest-btn:hover { background: rgba(124,92,255,0.2); }
.ai-suggest-btn:disabled { opacity: 0.6; }
.ai-rationale { font-size: 11px; color: var(--text-muted); font-style: italic; margin-top: 6px; }

/* ===== Theme synthesis ===== */
.synthesis-layout { display: grid; grid-template-columns: 260px 1fr; gap: 24px; }
.theme-sidebar .sidebar-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: background 0.1s; margin-bottom: 2px; }
.theme-sidebar .sidebar-item:hover { background: var(--surface-2); }
.theme-sidebar .sidebar-item.active { background: var(--surface-2); font-weight: 600; }
.theme-sidebar .sidebar-item .count { margin-left: auto; font-size: 11px; color: var(--text-dim); }
.theme-sidebar .sidebar-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

.synth-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 16px; }
.synth-panel .panel-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.synth-panel textarea { width: 100%; min-height: 160px; padding: 12px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; font-family: inherit; resize: vertical; line-height: 1.6; }
.synth-panel .hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
.annotation-refs { margin-top: 16px; }
.annotation-refs .ref { padding: 8px 10px; background: var(--surface-2); border-radius: 4px; margin-bottom: 4px; font-size: 12px; }
.annotation-refs .ref .site { color: var(--accent); font-weight: 500; }

/* ===== Report ===== */
.report { max-width: 1100px; margin: 0 auto; padding: 32px; }
.report h2.report-theme { font-size: 28px; margin: 48px 0 20px; padding-bottom: 12px; border-bottom: 2px solid var(--border); }
.report h3.report-section { font-size: 16px; color: var(--accent); margin: 20px 0 12px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
.report .md-content { line-height: 1.7; font-size: 15px; }
.report .md-content h2 { font-size: 18px; margin: 16px 0 8px; color: var(--text); }
.report .md-content p { margin-bottom: 12px; }
.report .md-content ol, .report .md-content ul { margin-left: 22px; margin-bottom: 12px; }
.report .md-content li { margin-bottom: 6px; }
.report .md-content strong { color: white; }
.report-site { margin-top: 48px; padding-top: 32px; border-top: 1px solid var(--border); }
.report-site h2 { font-size: 24px; }
.report-site .site-meta { color: var(--text-muted); margin-bottom: 20px; }

.perf-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin: 16px 0; }
.perf-metric { padding: 12px; background: var(--surface-2); border-radius: 6px; }
.perf-metric .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
.perf-metric .value { font-size: 20px; font-weight: 700; margin-top: 2px; }
.perf-metric .value.good { color: var(--good); }
.perf-metric .value.warn { color: var(--warn); }
.perf-metric .value.bad { color: var(--bad); }

/* ===== Modal ===== */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); max-width: 520px; width: 100%; padding: 24px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
.modal h2 { font-size: 18px; margin-bottom: 18px; }
.modal .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

/* ===== Toast ===== */
.toast-stack { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 200; }
.toast { padding: 10px 14px; background: var(--surface-3); color: var(--text); border-radius: 6px; font-size: 13px; box-shadow: var(--shadow-lg); border-left: 3px solid var(--accent); min-width: 240px; max-width: 400px; }
.toast.error { border-left-color: var(--bad); }
.toast.success { border-left-color: var(--good); }

/* ===== Utility ===== */
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.2); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.text-muted { color: var(--text-muted); }
.text-sm { font-size: 13px; }
.flex-gap { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.stack { display: flex; flex-direction: column; gap: 12px; }
.mb-16 { margin-bottom: 16px; }
.mt-16 { margin-top: 16px; }
</style>

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/marked@13.0.0/marked.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module" src="/app.js"></script>
</body>
</html>
